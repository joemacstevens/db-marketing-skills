<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DB Card</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0E0E;
    --surface: #1C1C1C;
    --red: #C4161C;
    --white: #FFFFFF;
    --muted: #8E8E8E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .photo {
    flex: 0 0 55%;
    background: url('photo.jpg') center / cover no-repeat;
    position: relative;
  }
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, #0E0E0E 100%);
  }
  .content {
    flex: 1;
    padding: 60px 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .tag {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.08em;
    padding: 10px 22px;
    text-transform: uppercase;
    align-self: flex-start;
    margin-bottom: 36px;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 140px;
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  h1 .accent { color: var(--red); }
  .sub {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 34px;
    color: var(--muted);
    margin-top: 32px;
    line-height: 1.3;
  }
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 2px solid var(--red);
    padding-top: 28px;
    margin-top: 40px;
  }
  .footer .brand {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .footer .tagline {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="photo"></div>
    <div class="content">
      <div>
        <span class="tag">Kids Boxing</span>
        <h1>Build <span class="accent">Confidence</span><br/>In Every Round</h1>
        <p class="sub">Every Monday &amp; Wednesday · 4 PM<br/>North Bergen, NJ</p>
      </div>
      <div class="footer">
        <span class="brand">Different Breed</span>
        <span class="tagline">Evolve Into Greatness</span>
      </div>
    </div>
  </div>
</body>
</html>
